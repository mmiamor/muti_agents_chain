<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Agent Chain - 流式输出示例</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 30px;
        }

        .input-section, .output-section {
            display: flex;
            flex-direction: column;
        }

        .section-title {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 500;
        }

        .input-group input,
        .input-group textarea,
        .input-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .input-group input:focus,
        .input-group textarea:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .primary-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .primary-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .secondary-btn {
            background: #f5f5f5;
            color: #666;
        }

        .secondary-btn:hover {
            background: #e0e0e0;
        }

        .event-stream {
            flex: 1;
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            max-height: 500px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .event-item {
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .event-item:last-child {
            border-bottom: none;
        }

        .event-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-right: 8px;
        }

        .event-type.phase { background: #e3f2fd; color: #1976d2; }
        .event-type.progress { background: #fff3e0; color: #f57c00; }
        .event-type.artifact { background: #e8f5e9; color: #388e3c; }
        .event-type.thinking { background: #f3e5f5; color: #7b1fa2; }
        .event-type.review { background: #fce4ec; color: #c2185b; }
        .event-type.error { background: #ffebee; color: #d32f2f; }
        .event-type.done { background: #e8f5e9; color: #388e3c; }

        .event-content {
            color: #333;
        }

        .event-time {
            color: #999;
            font-size: 11px;
            margin-left: 8px;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Multi-Agent Chain 流式输出</h1>
            <p>实时 AI 软件开发流水线 - 从需求到代码</p>
        </div>

        <div class="content">
            <div class="input-section">
                <div class="section-title">
                    📝 输入配置
                </div>

                <div class="input-group">
                    <label for="agent-select">执行模式</label>
                    <select id="agent-select">
                        <option value="full">完整 Pipeline (推荐)</option>
                        <option value="pm_agent">PM Agent (需求分析)</option>
                        <option value="architect_agent">Architect Agent (架构设计)</option>
                        <option value="design_agent">Design Agent (UI设计)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="thread-id">Thread ID (可选)</label>
                    <input type="text" id="thread-id" placeholder="留空自动生成">
                </div>

                <div class="input-group">
                    <label for="message">需求描述</label>
                    <textarea id="message" placeholder="描述你想做的应用...">我想做一个番茄钟应用，包含计时器和休息提醒功能</textarea>
                </div>

                <div class="button-group">
                    <button class="primary-btn" id="run-btn" onclick="runPipeline()">
                        ▶️ 开始执行
                    </button>
                    <button class="secondary-btn" id="clear-btn" onclick="clearEvents()">
                        🗑️ 清空日志
                    </button>
                </div>

                <div class="stats-bar">
                    <div class="stat-item">
                        <div class="stat-value" id="event-count">0</div>
                        <div class="stat-label">事件数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="duration">0s</div>
                        <div class="stat-label">耗时</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="status">就绪</div>
                        <div class="stat-label">状态</div>
                    </div>
                </div>
            </div>

            <div class="output-section">
                <div class="section-title">
                    📊 实时输出
                </div>
                <div class="event-stream" id="event-stream">
                    <div class="event-item">
                        <span class="event-content">等待执行...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let eventCount = 0;
        let startTime = null;
        let isRunning = false;

        async function runPipeline() {
            if (isRunning) return;

            const agent = document.getElementById('agent-select').value;
            const threadId = document.getElementById('thread-id').value || null;
            const message = document.getElementById('message').value;

            if (!message.trim()) {
                alert('请输入需求描述');
                return;
            }

            // 更新 UI 状态
            isRunning = true;
            document.getElementById('run-btn').disabled = true;
            document.getElementById('run-btn').innerHTML = '<span class="loading"></span> 执行中...';
            document.getElementById('status').textContent = '运行中';
            startTime = Date.now();
            eventCount = 0;
            updateDuration();

            // 清空事件流
            clearEvents();

            // 构建请求
            const url = agent === 'full'
                ? '/api/v1/stream/run'
                : `/api/v1/stream/agent/${agent}`;

            const params = new URLSearchParams({ message });
            if (threadId) {
                params.append('thread_id', threadId);
            }

            try {
                const response = await fetch(`${url}?${params}`, {
                    method: 'POST',
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const event = JSON.parse(line.slice(6));
                                displayEvent(event);
                                eventCount++;
                                document.getElementById('event-count').textContent = eventCount;

                                // 检查是否完成
                                if (event.type === 'done') {
                                    document.getElementById('status').textContent = '完成';
                                }
                            } catch (e) {
                                console.error('Failed to parse event:', e);
                            }
                        }
                    }
                }

            } catch (error) {
                displayEvent({
                    type: 'error',
                    timestamp: new Date().toISOString(),
                    data: {
                        error_type: 'ConnectionError',
                        message: error.message
                    }
                });
                document.getElementById('status').textContent = '错误';
            } finally {
                isRunning = false;
                document.getElementById('run-btn').disabled = false;
                document.getElementById('run-btn').innerHTML = '▶️ 开始执行';
            }
        }

        function displayEvent(event) {
            const stream = document.getElementById('event-stream');
            const eventItem = document.createElement('div');
            eventItem.className = 'event-item';

            const type = event.type || 'unknown';
            const timestamp = event.timestamp ? new Date(event.timestamp).toLocaleTimeString() : '';
            const data = event.data || {};

            let content = '';

            switch (type) {
                case 'phase':
                    content = `🔄 阶段: ${data.agent} - ${data.phase} (${data.status})`;
                    break;
                case 'progress':
                    const percent = data.percent || 0;
                    content = `📊 进度: ${percent}% - ${data.step}`;
                    break;
                case 'artifact':
                    content = `📦 产出物: ${data.agent} 生成 ${data.artifact_type}`;
                    if (data.content) {
                        if (data.artifact_type === 'prd' && data.content.vision) {
                            content += `<br><small>愿景: ${data.content.vision}</small>`;
                        }
                    }
                    break;
                case 'thinking':
                    content = `💭 ${data.agent}: ${data.content}`;
                    break;
                case 'review':
                    const emoji = data.status === 'APPROVED' ? '✅' : '❌';
                    content = `${emoji} 审查: ${data.status}`;
                    if (data.comments) {
                        content += `<br><small>${data.comments.substring(0, 100)}...</small>`;
                    }
                    break;
                case 'error':
                    content = `⚠️ 错误: ${data.error_type} - ${data.message}`;
                    break;
                case 'done':
                    content = `✅ 完成: ${data.thread_id} (耗时: ${data.duration?.toFixed(1)}s)`;
                    break;
                default:
                    content = `❓ 未知事件: ${type}`;
            }

            eventItem.innerHTML = `
                <span class="event-type ${type}">${type.toUpperCase()}</span>
                <span class="event-content">${content}</span>
                <span class="event-time">${timestamp}</span>
            `;

            stream.appendChild(eventItem);
            stream.scrollTop = stream.scrollHeight;
        }

        function clearEvents() {
            document.getElementById('event-stream').innerHTML = '';
            eventCount = 0;
            document.getElementById('event-count').textContent = '0';
            document.getElementById('duration').textContent = '0s';
        }

        function updateDuration() {
            if (startTime && isRunning) {
                const duration = ((Date.now() - startTime) / 1000).toFixed(1);
                document.getElementById('duration').textContent = `${duration}s`;
                requestAnimationFrame(updateDuration);
            }
        }
    </script>
</body>
</html>
